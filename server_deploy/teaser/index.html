<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="robots" content="noindex, nofollow">
  <meta name="description" content="HADAL — A server-authoritative deep sea strategy MMO. Coming to iOS and Android.">
  <meta name="theme-color" content="#030508">
  <title>HADAL</title>
  <link rel="icon" href="/favicon.svg" type="image/svg+xml">
  <link rel="alternate icon" href="/favicon.svg">
  <style>
    *, *::before, *::after {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    html, body {
      width: 100%;
      min-height: 100%;
      background: #030508;
    }

    body {
      display: flex;
      flex-direction: column;
      align-items: center;
      min-height: 100dvh;
      padding: clamp(1.5rem, 4vh, 2.5rem) 1rem clamp(1.25rem, 3vh, 2rem);
      font-family: "IBM Plex Mono", "JetBrains Mono", "Courier New", monospace;
      color: rgba(46, 230, 197, 0.72);
      overflow-x: hidden;
    }

    .stage {
      flex: 1;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      width: 100%;
      max-width: 720px;
      gap: clamp(1.25rem, 4vh, 2rem);
    }

    .sonar-stage {
      position: relative;
      width: min(68vw, 380px);
      height: min(68vw, 380px);
      display: flex;
      align-items: center;
      justify-content: center;
      flex-shrink: 0;
    }

    .sonar-ring {
      position: absolute;
      width: 18%;
      height: 18%;
      border: 1px solid rgba(46, 230, 197, 0.55);
      border-radius: 50%;
      box-shadow:
        0 0 12px rgba(46, 230, 197, 0.08),
        inset 0 0 24px rgba(46, 230, 197, 0.04);
      opacity: 0;
      animation: sonar-pulse 6s ease-out infinite;
    }

    .sonar-ring:nth-child(1) { animation-delay: 0s; }
    .sonar-ring:nth-child(2) { animation-delay: 2s; }
    .sonar-ring:nth-child(3) { animation-delay: 4s; }

    .sonar-core {
      position: absolute;
      width: 6px;
      height: 6px;
      border-radius: 50%;
      background: rgba(46, 230, 197, 0.9);
      box-shadow: 0 0 16px rgba(46, 230, 197, 0.45);
    }

    @keyframes sonar-pulse {
      0% {
        transform: scale(0.35);
        opacity: 0.85;
        border-color: rgba(46, 230, 197, 0.65);
      }
      70% {
        opacity: 0.12;
        border-color: rgba(64, 180, 255, 0.25);
      }
      100% {
        transform: scale(4.2);
        opacity: 0;
        border-color: rgba(64, 180, 255, 0);
      }
    }

    .vision-lines {
      text-align: center;
      font-size: clamp(0.62rem, 2vw, 0.78rem);
      font-weight: 300;
      letter-spacing: 0.12em;
      line-height: 1.9;
      color: rgba(160, 195, 205, 0.48);
      text-transform: none;
    }

    .vision-lines p {
      white-space: nowrap;
    }

    .tagline {
      text-align: center;
      font-size: clamp(0.62rem, 2.1vw, 0.8rem);
      font-weight: 300;
      letter-spacing: 0.14em;
      text-transform: uppercase;
      color: rgba(180, 210, 220, 0.55);
      white-space: nowrap;
    }

    .cursor {
      display: inline-block;
      width: 0.55em;
      margin-left: 0.1em;
      background: rgba(46, 230, 197, 0.75);
      animation: cursor-blink 1.1s step-end infinite;
    }

    @keyframes cursor-blink {
      0%, 49% { opacity: 1; }
      50%, 100% { opacity: 0; }
    }

    .syndicate {
      width: min(92vw, 420px);
      margin-top: clamp(0.5rem, 2vh, 1rem);
      border-top: 1px solid rgba(46, 230, 197, 0.08);
      padding-top: clamp(0.85rem, 2.5vh, 1.25rem);
    }

    .syndicate-label {
      font-size: clamp(0.58rem, 1.8vw, 0.68rem);
      letter-spacing: 0.18em;
      text-transform: uppercase;
      color: rgba(46, 230, 197, 0.28);
      margin-bottom: 0.65rem;
    }

    .capsule-terminal {
      display: flex;
      align-items: center;
      gap: 0.35rem;
      font-size: clamp(0.62rem, 2vw, 0.74rem);
      color: rgba(140, 175, 185, 0.42);
    }

    .capsule-prompt {
      flex-shrink: 0;
      color: rgba(46, 230, 197, 0.35);
      letter-spacing: 0.06em;
    }

    .capsule-input {
      flex: 1;
      min-width: 0;
      background: transparent;
      border: none;
      outline: none;
      font: inherit;
      color: rgba(46, 230, 197, 0.62);
      caret-color: rgba(46, 230, 197, 0.75);
      letter-spacing: 0.08em;
    }

    .capsule-input::placeholder {
      color: rgba(100, 130, 140, 0.28);
    }

    .capsule-feedback {
      min-height: 1.2em;
      margin-top: 0.55rem;
      font-size: clamp(0.56rem, 1.7vw, 0.66rem);
      letter-spacing: 0.14em;
      color: rgba(46, 230, 197, 0.38);
      opacity: 0;
      transition: opacity 0.6s ease;
    }

    .capsule-feedback.visible {
      opacity: 1;
    }

    .store-row {
      display: flex;
      align-items: center;
      justify-content: center;
      gap: clamp(1rem, 4vw, 1.75rem);
      margin-top: clamp(1rem, 3vh, 1.5rem);
      opacity: 0.3;
    }

    .store-badge {
      display: block;
      width: clamp(72px, 18vw, 96px);
      height: auto;
      color: rgba(46, 230, 197, 0.85);
      filter: grayscale(1) brightness(1.6);
      pointer-events: none;
      user-select: none;
    }

    @media (max-width: 480px) {
      .vision-lines p,
      .tagline {
        white-space: normal;
      }
    }

    @media (prefers-reduced-motion: reduce) {
      .sonar-ring { animation: none; opacity: 0.2; }
      .cursor { animation: none; opacity: 1; }
    }
  </style>
</head>
<body>
  <main class="stage">
    <div class="sonar-stage" aria-hidden="true">
      <span class="sonar-ring"></span>
      <span class="sonar-ring"></span>
      <span class="sonar-ring"></span>
      <span class="sonar-core"></span>
    </div>

    <div class="vision-lines" aria-label="Game vision">
      <p>&gt; _A Server-Authoritative Deep Sea Strategy MMO.</p>
      <p>&gt; _Coming to iOS &amp; Android.</p>
    </div>

    <p class="tagline">
      &gt; _BENEATH THE ABYSS. HUMANITY BEGINS AGAIN.<span class="cursor">&nbsp;</span>
    </p>

    <section class="syndicate" aria-label="The Syndicate signal">
      <p class="syndicate-label">The Syndicate · Capsule Channel</p>
      <div class="capsule-terminal">
        <span class="capsule-prompt">CAPSULE::</span>
        <input
          class="capsule-input"
          type="text"
          inputmode="email"
          autocomplete="off"
          spellcheck="false"
          maxlength="128"
          placeholder="enter signal address..."
          aria-label="Enter capsule signal address"
          id="capsule-input"
        >
      </div>
      <p class="capsule-feedback" id="capsule-feedback" role="status" aria-live="polite"></p>
    </section>

    <div class="store-row" aria-hidden="true">
      <!-- Monochrome inline badges — decorative, non-linked -->
      <svg class="store-badge" viewBox="0 0 120 36" xmlns="http://www.w3.org/2000/svg" aria-label="App Store">
        <rect x="0.5" y="0.5" width="119" height="35" rx="6" fill="none" stroke="currentColor" stroke-width="1"/>
        <path fill="currentColor" d="M22 10.2c0 .9-.5 1.7-1.2 2.2-.6.5-1.5.9-2.4.8-.1-.9.3-1.8.9-2.4.6-.6 1.6-1 2.5-1.1.1 1 .1 1.4.2 1.5zm1.1 1.8c-1.3-.1-2.4.7-3 7-.8 1.3-1.8 2.9-3.1 2.9-1.2 0-1.9-.8-3.5-.8-1.7 0-2.9.7-3.7 2.1-1.6 2.7-.4 6.7 1.1 8.9.7 1.1 1.6 2.3 2.7 2.2 1.1 0 1.5-.7 3.1-.7 1.6 0 2 .7 3.1.7 1.2 0 2-1.1 2.7-2.2.8-1.2 1.2-2.4 1.2-2.5-.1 0-2.3-.9-2.3-3.5 0-2.2 1.8-3.2 1.9-3.3-1.1-1.5-2.7-1.7-3.3-1.7z"/>
        <text x="38" y="14" fill="currentColor" font-size="6" font-family="monospace" letter-spacing="0.5">Download on the</text>
        <text x="38" y="26" fill="currentColor" font-size="11" font-family="monospace" font-weight="600">App Store</text>
      </svg>

      <svg class="store-badge" viewBox="0 0 120 36" xmlns="http://www.w3.org/2000/svg" aria-label="Google Play">
        <rect x="0.5" y="0.5" width="119" height="35" rx="6" fill="none" stroke="currentColor" stroke-width="1"/>
        <path fill="currentColor" d="M16 8.5l8.5 9.5L16 27.5V8.5zm1.5 1.8v15.4l6.8-7.7-6.8-7.7zm9.2 8.5l-2.8 3.1 5.8 3.3 2.9-1.7c1-.6 1-1.6 0-2.2l-5.9-3.5zm-3.5 3.9l-2.9 3.2 7.2 4.1 5.1-2.9-9.4-4.4z"/>
        <text x="38" y="14" fill="currentColor" font-size="6" font-family="monospace" letter-spacing="0.5">Get it on</text>
        <text x="38" y="26" fill="currentColor" font-size="11" font-family="monospace" font-weight="600">Google Play</text>
      </svg>
    </div>
  </main>

  <script>
    (function () {
      var input = document.getElementById('capsule-input');
      var feedback = document.getElementById('capsule-feedback');
      var pattern = /^[^\s@]+@[^\s@]+\.[^\s@]+$/;

      input.addEventListener('keydown', function (e) {
        if (e.key !== 'Enter') return;
        e.preventDefault();
        var value = input.value.trim();
        if (!value) return;

        if (pattern.test(value)) {
          feedback.textContent = '> SIGNAL LOGGED. THE SYNDICATE WILL FIND YOU.';
          try { localStorage.setItem('hadal_syndicate_signal', value); } catch (_) {}
        } else {
          feedback.textContent = '> INVALID CAPSULE. SIGNAL REQUIRES A VALID ADDRESS.';
        }

        feedback.classList.add('visible');
        input.value = '';
      });
    })();
  </script>
</body>
</html>
