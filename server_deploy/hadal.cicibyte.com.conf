# HADAL — hadal.cicibyte.com Nginx vhost (draft)
# Deploy ONLY to HADAL site config — never edit other domain vhosts.
#
# aaPanel note: Primary vhost is panel-managed at
#   /www/server/panel/vhost/nginx/hadal.cicibyte.com.conf
# HADAL-specific locations (e.g. /health) go in:
#   /www/server/panel/vhost/nginx/extension/hadal.cicibyte.com/hadal-teaser.conf
# See also: server_deploy/nginx-extension-hadal-teaser.conf
# Web root: /www/wwwroot/hadal.cicibyte.com
# Teaser: copy server_deploy/teaser/index.html → /www/wwwroot/hadal.cicibyte.com/index.html
#
# Pre-flight (on server):
#   nginx -t
#   ss -tlnp | grep -E ':80|:443'
#
# SSL paths below are placeholders — replace with panel-managed cert paths for hadal.cicibyte.com.

server {
    listen 80;
    listen [::]:80;
    server_name hadal.cicibyte.com;

    root /www/wwwroot/hadal.cicibyte.com;
    index index.html;

    # Redirect HTTP → HTTPS (enable after SSL cert is installed)
    # return 301 https://$host$request_uri;

    location / {
        try_files $uri $uri/ =404;
        add_header Cache-Control "no-store";
    }

    location /health {
        return 200 'ok';
        add_header Content-Type text/plain;
    }

    location = /favicon.svg {
        try_files /favicon.svg =404;
        add_header Cache-Control "public, max-age=604800";
        access_log off;
    }

    location ~* ^/favicon\.(ico|png|svg)$ {
        try_files $uri =404;
        add_header Cache-Control "public, max-age=604800";
        access_log off;
    }
}

server {
    listen 443 ssl http2;
    listen [::]:443 ssl http2;
    server_name hadal.cicibyte.com;

    root /www/wwwroot/hadal.cicibyte.com;
    index index.html;

    # --- SSL (replace with actual cert paths from hosting panel) ---
    ssl_certificate     /www/server/panel/vhost/cert/hadal.cicibyte.com/fullchain.pem;
    ssl_certificate_key /www/server/panel/vhost/cert/hadal.cicibyte.com/privkey.pem;
    ssl_protocols       TLSv1.2 TLSv1.3;
    ssl_prefer_server_ciphers on;

    # --- Static teaser / landing ---
    location / {
        try_files $uri $uri/ =404;
        add_header Cache-Control "no-store";
        add_header X-Frame-Options "SAMEORIGIN";
        add_header X-Content-Type-Options "nosniff";
    }

    location /health {
        return 200 'ok';
        add_header Content-Type text/plain;
    }

    location = /favicon.svg {
        try_files /favicon.svg =404;
        add_header Cache-Control "public, max-age=604800";
        access_log off;
    }

    location ~* ^/favicon\.(ico|png|svg)$ {
        try_files $uri =404;
        add_header Cache-Control "public, max-age=604800";
        access_log off;
    }

