# HADAL teaser — isolated nginx extension (aaPanel-compatible)
# Install: /www/server/panel/vhost/nginx/extension/hadal.cicibyte.com/hadal-teaser.conf
# Do NOT replace panel-managed hadal.cicibyte.com.conf — extend only.

location = /health {
    return 200 'ok';
    add_header Content-Type text/plain;
    access_log off;
}

location = /index.html {
    add_header Cache-Control "no-store";
}

location = /favicon.svg {
    add_header Cache-Control "public, max-age=604800";
    access_log off;
}

location ~* ^/favicon\.(ico|png|svg)$ {
    add_header Cache-Control "public, max-age=604800";
    access_log off;
}
